openapi: 3.0.4
info:
  title: User API Specification
  description: |-
    A User API registration to get some rooms in hotels
  version: 1.0-SNAPSHOT
servers:
  - url: https://localhost:8080
paths:
  /v1/registration:
    post:
      summary: Register a new user
      operationId: registerNewUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserWriteDto'
      responses:
        '201':
          description: User successfully created

  /v1/login:
    post:
      summary: Authentication of existing users
      operationId: login
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication is successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'


components:
  schemas:
    UserWriteDto:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    AuthRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        accessToken:
          type: string
        refreshToken:
          type: string